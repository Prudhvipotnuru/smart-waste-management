<!DOCTYPE html>
<html>
<head>
<title>Create House</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
	font-family: Arial;
	background-color: #f4f6f8;
	display: flex;
	justify-content: center;
	margin-top: 50px;
}

.container {
	background: white;
	padding: 25px;
	border-radius: 10px;
	width: 400px;
	box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

h2 {
	text-align: center;
}

input, textarea {
	width: 100%;
	padding: 10px;
	margin-top: 10px;
	margin-bottom: 15px;
	border-radius: 5px;
	border: 1px solid #ccc;
}

button {
	width: 100%;
	padding: 10px;
	background-color: #28a745;
	border: none;
	color: white;
	font-size: 16px;
	border-radius: 5px;
	cursor: pointer;
}

button:hover {
	background-color: #218838;
}

.message {
	margin-top: 15px;
	text-align: center;
	font-weight: bold;
}
</style>
</head>
<body>

	<div class="container">
		<h2>Create House</h2>

		<form id="houseForm">
			<input type="text" id="houseNumber" placeholder="House Number"
				required> <input type="text" id="ownerName"
				placeholder="Owner Name" required>
			<textarea id="address" placeholder="Address" required></textarea>
			<input type="text" id="ward" placeholder="Ward" required>

			<button type="submit">Save House</button>
		</form>

		<div class="message" id="message"></div>
	</div>

	<script>
	const token = localStorage.getItem("token");

	  if (!token) {
	    window.location.href = "/login.html";
	  }
	  
	// decode payload
	  const payload = JSON.parse(atob(token.split('.')[1]));

	  const roles = payload.roles;

	  const isAdmin = roles.some(r => r.authority === "ROLE_ADMIN");

	  if (!isAdmin) {
	    alert("Access denied");
	    window.location.href = "/waste.html";
	  }
	  
document.getElementById("houseForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        houseNumber: document.getElementById("houseNumber").value,
        ownerName: document.getElementById("ownerName").value,
        address: document.getElementById("address").value,
        ward: document.getElementById("ward").value
    };
    
    const token = localStorage.getItem("token");

    try {
        const response = await fetch("/collector/saveHouse", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("message").innerHTML =
            "✅ House Saved! <br> QR Code: " + result.qrCodeValue;

    } catch (error) {
        document.getElementById("message").innerText =
            "❌ Error saving house!";
    }
});
</script>

</body>
</html>
